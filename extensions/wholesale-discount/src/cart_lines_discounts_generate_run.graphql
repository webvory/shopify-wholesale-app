query RunInput {
  cart {
    lines {
      id
      quantity
      merchandise {
        ... on ProductVariant {
          id
        }
      }
    }

    buyerIdentity {
      customer {
        bronze: hasAnyTag(tags: ["wholesale-bronze"])
        silver: hasAnyTag(tags: ["wholesale-silver"])
        gold: hasAnyTag(tags: ["wholesale-gold"])
        platinum: hasAnyTag(tags: ["wholesale-platinum"])
        distributor: hasAnyTag(tags: ["distributor"])
        vip: hasAnyTag(tags: ["vip", "vip-wholesale"])
        wholesale: hasAnyTag(tags: ["wholesale"])
      }
    }
  }

  discount {
    discountClasses
      metafield(namespace: "discount", key: "config") {  # ✅ THIS is correct for your type
      value
    }
  }
}